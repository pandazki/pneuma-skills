appId: com.pneuma.skills
productName: Pneuma Skills
copyright: Copyright © 2024-2026 Pneuma Skills

protocols:
  - name: Pneuma
    schemes:
      - pneuma

directories:
  output: release

files:
  - "dist-electron/**/*"
  - "package.json"

extraResources:
  # Tray icons (loaded at runtime from resourcesPath)
  - from: "resources/tray-iconTemplate.png"
    to: "tray-iconTemplate.png"
  - from: "resources/tray-iconTemplate@2x.png"
    to: "tray-iconTemplate@2x.png"
  - from: "resources/tray-icon.png"
    to: "tray-icon.png"
  - from: "resources/tray-icon@2x.png"
    to: "tray-icon@2x.png"
  # Bundled Bun binary (downloaded at build time)
  - from: "resources/bun-${platform}-${arch}"
    to: "bun"
    filter:
      - "**/*"
  # Pneuma project files (server, modes, frontend build)
  - from: "../bin"
    to: "pneuma/bin"
  - from: "../server"
    to: "pneuma/server"
  - from: "../backends"
    to: "pneuma/backends"
  - from: "../core"
    to: "pneuma/core"
  - from: "../modes"
    to: "pneuma/modes"
  - from: "../snapshot"
    to: "pneuma/snapshot"
  - from: "../dist"
    to: "pneuma/dist"
  - from: "../index.html"
    to: "pneuma/index.html"
  - from: "../package.json"
    to: "pneuma/package.json"
  # Frontend source + Vite config — required for mode-maker's "Play" feature,
  # which spawns a child pneuma process with `--dev` so Vite can dedupe
  # src/store/* by file path (Bun.build would produce a duplicate store
  # instance, breaking cross-module state sharing in the mode viewer).
  # Without these, the play child's Vite boots with no index.html entry to
  # serve, never prints its ready signal, and the launcher falls back to a
  # URL pointing at a port nothing is listening on.
  - from: "../src"
    to: "pneuma/src"
  - from: "../vite.config.ts"
    to: "pneuma/vite.config.ts"
  - from: "../public"
    to: "pneuma/public"
  - from: "../tsconfig.json"
    to: "pneuma/tsconfig.json"
  # Vendored runtime bundles (e.g. dom-to-pptx for slide PPTX export).
  # Server reads these via `Bun.file(join(import.meta.dir, "..", "..", "vendor", ...))`,
  # so the directory must sit at pneuma/vendor next to bin/, server/, etc.
  - from: "../vendor"
    to: "pneuma/vendor"
  # Runtime node_modules for the Bun server (production deps only)
  # Built by: node scripts/prepare-deps.mjs
  - from: "pneuma-node-modules"
    to: "pneuma/node_modules"

asar: true

mac:
  icon: resources/icon.icns
  category: public.app-category.developer-tools
  artifactName: "Pneuma-Skills-${version}-${arch}-mac.${ext}"
  target:
    - target: dmg
    - target: zip
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

dmg:
  sign: false

win:
  icon: resources/icon.ico
  target:
    - target: nsis

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: "Pneuma-Skills-${version}-${arch}-Setup.exe"

linux:
  icon: resources/icon.png
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

publish:
  - provider: github
    owner: pandazki
    repo: pneuma-skills
