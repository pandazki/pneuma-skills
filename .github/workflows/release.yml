name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check-version:
    name: Check for version bump
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version-check.outputs.should_release }}
      version: ${{ steps.version-check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version tag already exists
        id: version-check
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists — skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No tag v${VERSION} found — will release"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Test, Build & Release
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Extract changelog
        id: changelog
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          BODY=$(awk -v ver="## [${VERSION}]" '
            index($0, ver) { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          BODY=$(echo "$BODY" | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba;}')
          if [ -z "$BODY" ]; then
            BODY="Release v${VERSION}"
          fi
          echo "$BODY" > /tmp/release-notes.md

      - name: Create git tag
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release-notes.md

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Desktop builds (run after release is created) ────────────────────────
  desktop:
    name: Desktop (${{ matrix.os-label }})
    needs: [check-version, release]
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            os-label: macOS
            platform: darwin
            arch: universal
            electron-args: "--mac --universal"
          - os: windows-latest
            os-label: Windows x64
            platform: win32
            arch: x64
            electron-args: "--win --x64"
          - os: ubuntu-latest
            os-label: Linux x64
            platform: linux
            arch: x64
            electron-args: "--linux --x64"

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install project dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Download Bun binary for target
        working-directory: desktop
        shell: bash
        run: |
          if [ "${{ matrix.arch }}" = "universal" ]; then
            # macOS universal: need both arm64 and x64
            node scripts/download-bun.mjs --platform ${{ matrix.platform }} --arch arm64
            node scripts/download-bun.mjs --platform ${{ matrix.platform }} --arch x64
          else
            node scripts/download-bun.mjs --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
          fi

      - name: Prepare production node_modules
        working-directory: desktop
        run: node scripts/prepare-deps.mjs

      - name: Install Electron dependencies
        working-directory: desktop
        run: npm install

      - name: Build Electron main/preload
        working-directory: desktop
        run: npx tsup

      - name: Sync version from root package.json
        working-directory: desktop
        shell: bash
        run: |
          VERSION=$(node -p "require('../package.json').version")
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build Electron app
        working-directory: desktop
        run: npx electron-builder ${{ matrix.electron-args }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          for file in desktop/release/*.{dmg,zip,exe,AppImage,deb,yml}; do
            if [ -f "$file" ]; then
              echo "Uploading $(basename "$file")..."
              gh release upload "$TAG" "$file" --clobber
            fi
          done
