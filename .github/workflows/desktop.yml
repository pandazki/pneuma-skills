name: Desktop Build

on:
  release:
    types: [created]

concurrency:
  group: desktop-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
            electron-args: "--mac --arm64"
          - os: macos-13
            platform: darwin
            arch: x64
            electron-args: "--mac --x64"
          - os: windows-latest
            platform: win32
            arch: x64
            electron-args: "--win --x64"
          - os: ubuntu-latest
            platform: linux
            arch: x64
            electron-args: "--linux --x64"

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Install project dependencies & build frontend
      - name: Install project dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      # Prune devDependencies for smaller bundle
      - name: Prune to production deps
        run: bun install --production --frozen-lockfile

      # Download platform-specific Bun binary
      - name: Download Bun binary
        working-directory: desktop
        run: node scripts/download-bun.mjs --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}

      # Install Electron dependencies & build
      - name: Install Electron dependencies
        working-directory: desktop
        run: npm install

      - name: Sync version from root package.json
        working-directory: desktop
        shell: bash
        run: |
          VERSION=$(node -p "require('../package.json').version")
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build Electron app
        working-directory: desktop
        run: npx electron-builder ${{ matrix.electron-args }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload artifacts to the GitHub Release
      - name: Upload to GitHub Release
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Upload all distributable files (dmg, zip, exe, AppImage, deb)
          for file in desktop/release/*.{dmg,zip,exe,AppImage,deb}; do
            if [ -f "$file" ]; then
              echo "Uploading $(basename $file)..."
              gh release upload "$TAG" "$file" --clobber
            fi
          done
          # Also upload yml files for auto-updater
          for file in desktop/release/*.yml; do
            if [ -f "$file" ]; then
              echo "Uploading $(basename $file)..."
              gh release upload "$TAG" "$file" --clobber
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
